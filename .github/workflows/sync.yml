name: Breezeway Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests psycopg2-binary python-dotenv schedule

      - name: Run Breezeway sync
        env:
          BREEZEWAY_CLIENT_ID: ${{ secrets.BREEZEWAY_CLIENT_ID }}
          BREEZEWAY_CLIENT_SECRET: ${{ secrets.BREEZEWAY_CLIENT_SECRET }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          python -c "
          from breezeway_tableau_sync import init_database, run_sync
          init_database()
          run_sync()
          "
